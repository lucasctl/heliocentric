<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heliocentric/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heliocentric</title>
  </head>
  <body class="min-h-svh text-slate-200">
    <main class="mx-auto max-w-5xl px-5 py-16">

      <header class="text-center mb-14">
        <div class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-1.5 text-xs text-white/40 mb-5">
          <i class="ph ph-planet"></i>
          Solar system birthday calculator
        </div>
        <h1 class="text-5xl font-bold tracking-tight text-white mb-3">Heliocentric</h1>
        <p class="text-white/40">Enter your birthday to discover your age across the solar system.</p>
      </header>

      <div class="flex justify-center mb-14">
        <div class="flex flex-col gap-2">
          <label for="birthday" class="flex items-center gap-1.5 text-sm text-white/45">
            <i class="ph ph-cake"></i>
            Your birthday
          </label>
          <input
            type="date"
            id="birthday"
            class="rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-base font-medium text-white/90 outline-none transition focus:border-white/25 focus:bg-white/[0.08] cursor-pointer"
          />
        </div>
      </div>

      <div id="results" class="grid grid-cols-2 gap-3 lg:grid-cols-4"></div>

      <!-- Future birthdays detail panel — populated by JS when a card is clicked -->
      <div
        id="planet-detail"
        class="hidden card rounded-2xl p-6 mt-5"
        aria-live="polite"
      ></div>

    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
